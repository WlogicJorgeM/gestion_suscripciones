<div class="login-page">
  <div class="login-wrapper">
    <div class="login-logo">
      <div class="logo-icon">D</div>
      <h1>Davivienda</h1>
      <p>Sistema de Gestión de Suscripciones</p>
    </div>

    <div class="login-card">
      <div class="card-header"><i class="pi pi-sign-in"></i>Iniciar Sesión</div>
      <div class="card-body">
        <div class="login-info">
          <i class="pi pi-info-circle"></i>
          Ingresa con tu correo. Serás redirigido al <strong>Panel Admin</strong> o al <strong>Portal Cliente</strong> según tu rol.
        </div>

        @if (error()) {
          <div class="error-msg"><i class="pi pi-exclamation-circle"></i>{{ error() }}</div>
        }

        <form (ngSubmit)="onLogin()">
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <p-inputGroup>
              <p-inputGroupAddon><i class="pi pi-envelope"></i></p-inputGroupAddon>
              <input pInputText id="email" type="email" [(ngModel)]="email" name="email"
                required placeholder="usuario&#64;davivienda.com" class="w-full" />
            </p-inputGroup>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <p-password id="password" [(ngModel)]="password" name="password"
              [toggleMask]="true" [feedback]="false" placeholder="Ingresa tu contraseña"
              styleClass="w-full" inputStyleClass="w-full" />
          </div>

          <p-button type="submit" [loading]="loading()" styleClass="w-full"
            [label]="loading() ? 'Verificando...' : 'Iniciar Sesión'"
            icon="pi pi-sign-in" severity="danger" />
        </form>
      </div>
      <div class="card-footer">
        ¿No tienes cuenta? <a routerLink="/register">Crear cuenta</a>
      </div>
    </div>

    <p class="copyright">&copy; 2026 Davivienda. Todos los derechos reservados.</p>
  </div>
</div>
