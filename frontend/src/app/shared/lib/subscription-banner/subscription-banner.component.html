@if (loading) {
  <p-card styleClass="shadow-2 mb-4 text-center">
    <p-progressSpinner strokeWidth="3" styleClass="w-3rem h-3rem" />
    <p class="text-500 font-medium mt-3 m-0">Cargando tu información...</p>
  </p-card>
} @else if (!isActive) {
  <p-message severity="error" styleClass="w-full mb-4">
    <ng-template pTemplate="content">
      <div class="flex flex-column align-items-center text-center p-4 w-full">
        <i class="pi pi-lock text-5xl text-red-500 mb-3"></i>
        <span class="text-xl font-bold text-red-700 mb-2">Suscripción Vencida</span>
        <span class="text-red-600 mb-3">
          Tu suscripción ha expirado. Contacta al administrador para renovar tu plan.
        </span>
        <p-tag value="BLOQUEADO" severity="danger" icon="pi pi-exclamation-triangle" />
      </div>
    </ng-template>
  </p-message>
} @else {
  <p-message severity="success" styleClass="w-full mb-4">
    <ng-template pTemplate="content">
      <div class="flex align-items-center justify-content-between w-full p-2">
        <div class="flex align-items-center gap-3">
          <i class="pi pi-check-circle text-3xl text-green-500"></i>
          <div>
            <span class="text-lg font-bold text-green-800">Tu suscripción está activa</span>
            @if (endDate) {
              <p class="text-green-600 text-sm m-0 mt-1">
                <i class="pi pi-calendar mr-1"></i>Vence el {{ endDate | date:'dd/MM/yyyy' }}
              </p>
            }
          </div>
        </div>
        <p-tag value="ACTIVA" severity="success" icon="pi pi-check" styleClass="text-base px-3 py-2" />
      </div>
    </ng-template>
  </p-message>
}
